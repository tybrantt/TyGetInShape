// ─── STORAGE (localStorage for standalone use) ────────────────────────────

function storageGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function todayKey() {
  return `fitness_checkin_${new Date().toISOString().split("T")[0]}`;
}
function dateKey(daysAgo) {
  const d = new Date(); d.setDate(d.getDate() - daysAgo);
  return `fitness_checkin_${d.toISOString().split("T")[0]}`;
}
function shortDate(daysAgo) {
  const d = new Date(); d.setDate(d.getDate() - daysAgo);
  return d.toLocaleDateString("en-US", { weekday: "short", month: "numeric", day: "numeric" });
}
function dayScore(data) {
  if (!data) return 0;
  return (data.meals || []).filter(Boolean).length + (data.workout ? 4 : 0);
}
function getGrade(pct) {
  if (pct >= 95) return { letter: "A+", color: "#00d4aa", label: "Elite" };
  if (pct >= 90) return { letter: "A",  color: "#00d4aa", label: "Excellent" };
  if (pct >= 80) return { letter: "B",  color: "#7ecb20", label: "Strong" };
  if (pct >= 70) return { letter: "C",  color: "#ff9500", label: "Solid" };
  if (pct >= 60) return { letter: "D",  color: "#ff6b35", label: "Keep Going" };
  return           { letter: "F",  color: "#ff3b5c", label: "Restart" };
}
function emptyDay() { return { meals: Array(MEALS.length).fill(false), workout: false }; }

// ─── COMPONENTS ─────────────────────────────────────────────────────────────

function Checkbox({ checked, onToggle, color = "#00d4aa" }) {
  return (
    <div onClick={e => { e.stopPropagation(); onToggle(); }} style={{
      width: 26, height: 26, borderRadius: 6, flexShrink: 0, cursor: "pointer",
      border: `2px solid ${checked ? color : "#2a3a4a"}`,
      background: checked ? color : "transparent",
      display: "flex", alignItems: "center", justifyContent: "center",
      transition: "all 0.15s ease", userSelect: "none",
    }}>
      {checked && <span style={{ color: "#000", fontSize: 14, fontWeight: 900, lineHeight: 1 }}>✓</span>}
    </div>
  );
}

function ScoreRing({ score, max, color, size = 90 }) {
  const pct = max > 0 ? score / max : 0;
  const r = (size / 2) - 8;
  const circ = 2 * Math.PI * r;
  const dash = pct * circ;
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a2332" strokeWidth={7} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={7}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition: "stroke-dasharray 0.4s ease" }} />
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
        fill="#fff" fontSize={18} fontWeight="800">{score}</text>
      <text x={size/2} y={size/2+15} textAnchor="middle" dominantBaseline="middle"
        fill="#4a6080" fontSize={9}>/{max}</text>
    </svg>
  );
}

    return Array.from({ length: 7 }, (_, i) => ({
      label: shortDate(i), data: storageGet(dateKey(i)), isToday: i === 0,

    setTodayData(newData);

    const meals = [...todayData.meals]; meals[i] = !meals[i];

                { label: "Day Streak", val: `${streak}🔥`, sub: streak === 1 ? "day" : "days", c: "#a78bfa" },
              ].map(s => (
                <div key={s.label} style={{ background: "#0d1623", border: `1px solid ${s.c}25`, borderRadius: 12, padding: 14, textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontWeight: 900, color: s.c }}>{s.val}</div>
                  <div style={{ fontSize: 9, color: "#4a6080", textTransform: "uppercase", marginTop: 2 }}>{s.label}</div>
                  <div style={{ fontSize: 10, color: "#627990", marginTop: 2 }}>{s.sub}</div>
                </div>
              ))}
            </div>

            {/* 7-Day Chart */}
            <div style={{ background: "#0d1623", borderRadius: 14, padding: 16, marginBottom: 14, border: "1px solid #1a2332" }}>
              <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Last 7 Days</div>
              <div style={{ display: "flex", gap: 6 }}>
                {[...weekHistory].reverse().map((h, i) => {
                  const s = dayScore(h.data);
                  const g = getGrade(Math.round((s / MAX_DAILY) * 100));
                  const barH = Math.max(4, Math.round((s / MAX_DAILY) * 60));
                  return (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: s > 0 ? g.color : "#2a3a4a" }}>{s > 0 ? g.letter : "—"}</div>
                      <div style={{ width: "100%", height: 60, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                        <div style={{ width: "70%", height: barH, borderRadius: 3, background: s > 0 ? g.color : "#1a2332", opacity: h.isToday ? 1 : 0.7 }} />
                      </div>
                      <div style={{ fontSize: 9, color: h.isToday ? "#fff" : "#4a6080", textAlign: "center", lineHeight: 1.3 }}>
                        {h.label.split(",")[0]}
                        {h.isToday && <div style={{ color: "#00d4aa", fontSize: 8 }}>today</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Scoring Key */}
            <div style={{ background: "#0d1623", borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid #1a2332" }}>
              <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>Scoring System</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                {[{ label: "Each Meal", pts: "+1 pt", c: "#00d4aa" }, { label: "Workout Done", pts: "+4 pts", c: "#ff9500" }, { label: "Max/Day", pts: "10 pts", c: "#a78bfa" }].map(s => (
                  <div key={s.label} style={{ background: s.c + "12", border: `1px solid ${s.c}25`, borderRadius: 8, padding: "6px 12px" }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: s.c }}>{s.pts}</div>
                    <div style={{ fontSize: 10, color: "#627990" }}>{s.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {[{ letter: "A+", range: "95–100%", c: "#00d4aa" }, { letter: "A", range: "90–94%", c: "#00d4aa" }, { letter: "B", range: "80–89%", c: "#7ecb20" }, { letter: "C", range: "70–79%", c: "#ff9500" }, { letter: "D", range: "60–69%", c: "#ff6b35" }, { letter: "F", range: "<60%", c: "#ff3b5c" }].map(g => (
                  <div key={g.letter} style={{ fontSize: 11, borderRadius: 6, padding: "3px 10px", background: g.c + "12", border: `1px solid ${g.c}25`, color: g.c }}>
                    <span style={{ fontWeight: 800 }}>{g.letter}</span> {g.range}
                  </div>
                ))}
              </div>
            </div>

            {/* Meal Check-ins */}
            <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Today's Meals</div>
            {MEALS.map((meal, i) => (
              <div key={i} onClick={() => toggleMeal(i)} style={{ background: todayData.meals[i] ? "#00d4aa0d" : "#0d1623", border: `1px solid ${todayData.meals[i] ? "#00d4aa40" : "#1a2332"}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8, display: "flex", alignItems: "center", gap: 12, cursor: "pointer", transition: "all 0.15s ease", userSelect: "none" }}>
                <Checkbox checked={todayData.meals[i]} onToggle={() => toggleMeal(i)} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10, color: todayData.meals[i] ? "#00d4aa" : "#4a6080", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 2 }}>{meal.time} — {meal.label}</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: todayData.meals[i] ? "#e8edf5" : "#627990" }}>{meal.main}</div>
                </div>
                <div style={{ fontSize: 12, fontWeight: 700, color: todayData.meals[i] ? "#00d4aa" : "#4a6080" }}>{todayData.meals[i] ? "✓ +1" : "+1"}</div>
              </div>
            ))}

            {/* Workout Check-in */}
            <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10, marginTop: 18 }}>Today's Workout</div>
            <div onClick={toggleWorkout} style={{ background: todayData.workout ? "#ff950012" : "#0d1623", border: `1px solid ${todayData.workout ? "#ff950060" : "#1a2332"}`, borderRadius: 14, padding: 18, cursor: "pointer", display: "flex", alignItems: "center", gap: 14, transition: "all 0.15s ease", userSelect: "none" }}>
              <Checkbox checked={todayData.workout} onToggle={toggleWorkout} color="#ff9500" />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: todayData.workout ? "#ff9500" : "#e8edf5" }}>💪 Workout Complete</div>
                <div style={{ fontSize: 12, color: "#627990", marginTop: 3 }}>Tap to mark your workout done for today</div>
              </div>
              <div style={{ fontSize: 14, fontWeight: 800, color: todayData.workout ? "#ff9500" : "#4a6080" }}>{todayData.workout ? "✓ +4" : "+4"}</div>
            </div>
          </div>
        )}

        {/* ─── OVERVIEW ─── */}
        {tab === "overview" && (
          <div>
            <div style={{ background: "#0d1623", borderRadius: 14, padding: 18, marginBottom: 14, border: "1px solid #1a2332" }}>
              <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Your Daily Schedule</div>
              {[
                { time: "6:15", label: "Wake up — East Coast email triage begins", accent: "#ff9500" },
                { time: "7:00", label: "Breakfast — high protein to fuel the morning", accent: "#00d4aa" },
                { time: "10:30", label: "Mid-morning snack — keeps energy stable at desk", accent: "#00d4aa" },
                { time: "12:00", label: "Pre-workout snack — light carbs + protein", accent: "#38bdf8" },
                { time: "12:30", label: "WORKOUT — 35–55 min, home gym", accent: "#00d4aa", bold: true },
                { time: "1:30", label: "Post-workout lunch — biggest meal of the day", accent: "#00d4aa" },
                { time: "4:30", label: "Afternoon snack", accent: "#00d4aa" },
                { time: "7:00", label: "Dinner — lighter, protein-focused", accent: "#00d4aa" },
                { time: "10:00", label: "Lights out — 8 hrs of sleep is non-negotiable", accent: "#a78bfa" },
              ].map((row, i) => (
                <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 12 }}>
                  <div style={{ width: 42, fontSize: 11, color: "#4a6080", flexShrink: 0, paddingTop: 1 }}>{row.time}</div>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: row.accent, flexShrink: 0, marginTop: 5 }} />
                  <div style={{ fontSize: 13, color: row.bold ? "#fff" : "#94a8c0", lineHeight: 1.4, fontWeight: row.bold ? 700 : 400 }}>{row.label}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>The 3-Phase Progression</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
              {PHASES.map((ph, i) => (
                <div key={i} style={{ background: "#0d1623", border: `1px solid ${ph.color}30`, borderRadius: 12, padding: 14, textAlign: "center" }}>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: ph.bg, border: `1px solid ${ph.color}50`, margin: "0 auto 10px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: ph.color }}>{ph.num}</div>
                  <div style={{ fontSize: 12, fontWeight: 800, color: "#fff" }}>{ph.label}</div>
                  <div style={{ fontSize: 10, color: ph.color, marginTop: 3 }}>{ph.days}</div>
                  <div style={{ fontSize: 10, color: "#4a6080", marginTop: 8, lineHeight: 1.4 }}>{ph.freq}</div>
                </div>
              ))}
            </div>
            <div style={{ background: "#0d1623", borderRadius: 14, padding: 18, border: "1px solid #1a2332" }}>
              <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Non-Negotiable Rules</div>
              {[
                ["12:30 PM workouts", "After the email crunch, your cortisol is elevated — perfect for training. Use it."],
                ["180g protein daily", "Protects muscle mass while you burn fat. The single most important nutrition number."],
                ["Progressive overload", "Add weight or reps every 1–2 weeks. If it's not getting harder, you're not growing."],
                ["8 hours of sleep", "10 PM bedtime. Fat loss and muscle growth happen overnight. Sleep is the third leg of this plan."],
                ["Weigh in Mondays", "Same time, same conditions. Use a 4-week rolling average, not day-to-day fluctuations."],
                ["Score 70+ every day", "Use the Track tab daily. A C or better keeps the momentum going."],
              ].map(([title, body], i) => (
                <div key={i} style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 4, background: "#00d4aa18", border: "1px solid #00d4aa40", flexShrink: 0, marginTop: 1, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#00d4aa", fontWeight: 700 }}>✓</div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#fff" }}>{title}</div>
                    <div style={{ fontSize: 12, color: "#627990", marginTop: 3, lineHeight: 1.5 }}>{body}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ─── WORKOUTS ─── */}
        {tab === "workouts" && (
          <div>
            <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
              {PHASES.map((ph, i) => (
                <button key={i} onClick={() => { setPhaseIdx(i); setWorkoutIdx(0); }} style={{ flex: 1, padding: "10px 6px", border: `1px solid ${phaseIdx === i ? ph.color : "#1a2332"}`, borderRadius: 10, background: phaseIdx === i ? ph.bg : "#0d1623", color: phaseIdx === i ? ph.color : "#4a6080", cursor: "pointer", fontSize: 11, fontWeight: 700, letterSpacing: 0.5 }}>
                  {ph.label}<br /><span style={{ fontSize: 9, opacity: 0.7, fontWeight: 400 }}>{ph.days}</span>
                </button>
              ))}
            </div>
            <div style={{ background: "#0d1623", borderRadius: 12, padding: 16, border: `1px solid ${phase.color}25`, marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: phase.color, fontWeight: 700, marginBottom: 6 }}>{phase.freq}</div>
              <div style={{ fontSize: 13, color: "#94a8c0", lineHeight: 1.5, marginBottom: 12 }}>{phase.desc}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {phase.schedule.map((s, i) => (
                  <div key={i} style={{ fontSize: 11, borderRadius: 6, padding: "4px 10px", background: DAY_COLORS[s.type] + "15", border: `1px solid ${DAY_COLORS[s.type]}30`, color: DAY_COLORS[s.type] }}>
                    <span style={{ opacity: 0.6, fontSize: 10 }}>{s.day} </span>{s.label}
                  </div>
                ))}
              </div>
            </div>
            {phase.workouts.length > 1 && (
              <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
                {phase.workouts.map((w, i) => (
                  <button key={i} onClick={() => setWorkoutIdx(i)} style={{ flex: 1, padding: "9px 6px", border: `1px solid ${workoutIdx === i ? phase.color : "#1a2332"}`, borderRadius: 8, background: workoutIdx === i ? phase.color + "18" : "#0d1623", color: workoutIdx === i ? phase.color : "#4a6080", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>{w.name}</button>
                ))}
              </div>
            )}
            {(() => {
              const w = phase.workouts[workoutIdx] || phase.workouts[0];
              return (
                <div style={{ background: "#0d1623", borderRadius: 14, padding: 16, border: "1px solid #1a2332" }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "#fff", marginBottom: 16, paddingBottom: 12, borderBottom: "1px solid #1a2332" }}>💪 {w.name}</div>
                  {w.exercises.map((ex, ei) => (
                    <div key={ei} style={{ marginBottom: ei < w.exercises.length-1 ? 12 : 0, paddingBottom: ei < w.exercises.length-1 ? 12 : 0, borderBottom: ei < w.exercises.length-1 ? "1px solid #111a28" : "none" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, color: "#e8edf5" }}>{ex.name}</div>
                          {ex.tip && <div style={{ fontSize: 11, color: "#4a6080", marginTop: 2 }}>{ex.tip}</div>}
                        </div>
                        <div style={{ display: "flex", gap: 6, flexShrink: 0, marginLeft: 10 }}>
                          {[{ val: ex.sets, label: "sets", c: phase.color, bg: phase.bg }, { val: ex.reps, label: "reps", c: "#94a8c0", bg: "#111a28" }, { val: ex.rest, label: "rest", c: "#627990", bg: "#111a28" }].map((b, bi) => (
                            <div key={bi} style={{ background: b.bg, border: `1px solid ${b.c}30`, borderRadius: 6, padding: "3px 8px", textAlign: "center" }}>
                              <div style={{ fontSize: bi === 0 ? 14 : 12, fontWeight: 700, color: b.c }}>{b.val}</div>
                              <div style={{ fontSize: 9, color: "#4a6080" }}>{b.label}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}
            {phaseIdx === 2 && (
              <div style={{ background: "#ff3b5c12", border: "1px solid #ff3b5c30", borderRadius: 12, padding: 14, marginTop: 12 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#ff3b5c", marginBottom: 6 }}>⚡ Saturday HIIT Protocol</div>
                <div style={{ fontSize: 12, color: "#94a8c0", lineHeight: 1.6 }}>20 minutes total. 30 sec max effort → 60 sec rest. Repeat 13 rounds. Zero equipment needed.</div>
              </div>
            )}
          </div>
        )}

        {/* ─── MEALS ─── */}
        {tab === "meals" && (
          <div>
            <div style={{ background: "#0d1623", borderRadius: 14, padding: 16, marginBottom: 14, border: "1px solid #1a2332" }}>
              <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Daily Macro Targets</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                {[{ label: "Calories", val: "1,750", c: "#ff9500", sub: "kcal" }, { label: "Protein", val: "180g", c: "#00d4aa", sub: "priority" }, { label: "Carbs", val: "145g", c: "#38bdf8", sub: "fuel" }, { label: "Fat", val: "50g", c: "#f472b6", sub: "hormones" }].map(m => (
                  <div key={m.label} style={{ textAlign: "center", background: "#111a28", border: `1px solid ${m.c}25`, borderRadius: 10, padding: "12px 6px" }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: m.c }}>{m.val}</div>
                    <div style={{ fontSize: 9, color: "#4a6080", marginTop: 3, textTransform: "uppercase" }}>{m.label}</div>
                    <div style={{ fontSize: 9, color: m.c, opacity: 0.6, marginTop: 2 }}>{m.sub}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Sample Daily Meal Plan</div>
            {MEALS.map((meal, i) => (
              <div key={i} style={{ background: "#0d1623", borderRadius: 12, padding: 14, marginBottom: 10, border: "1px solid #1a2332" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div>
                    <div style={{ fontSize: 10, color: "#00d4aa", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 2 }}>{meal.time} — {meal.label}</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#e8edf5" }}>{meal.main}</div>
                    <div style={{ fontSize: 12, color: "#627990", marginTop: 2 }}>{meal.side}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: "#ff9500" }}>{meal.cal}</div>
                    <div style={{ fontSize: 9, color: "#4a6080", textTransform: "uppercase" }}>kcal</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  {[{ label: "Protein", val: meal.protein+"g", c: "#00d4aa" }, { label: "Carbs", val: meal.carbs+"g", c: "#38bdf8" }, { label: "Fat", val: meal.fat+"g", c: "#f472b6" }].map(m => (
                    <div key={m.label} style={{ fontSize: 11, borderRadius: 5, padding: "3px 8px", background: m.c+"12", border: `1px solid ${m.c}25`, color: m.c }}>{m.label}: {m.val}</div>
                  ))}
                </div>
              </div>
            ))}
            <div style={{ background: "#ff950012", border: "1px solid #ff950030", borderRadius: 10, padding: 12, marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 13, color: "#ff9500", fontWeight: 700 }}>Daily Total</div>
              <div style={{ display: "flex", gap: 16 }}>
                {[{ label: "Cal", val: "1,750" }, { label: "Protein", val: "180g" }, { label: "Carbs", val: "145g" }, { label: "Fat", val: "50g" }].map(t => (
                  <div key={t.label} style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: "#fff" }}>{t.val}</div>
                    <div style={{ fontSize: 9, color: "#4a6080", textTransform: "uppercase" }}>{t.label}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background: "#0d1623", borderRadius: 14, padding: 16, border: "1px solid #1a2332" }}>
              <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Nutrition Strategy</div>
              {TIPS.map((t, i) => (
                <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                  <div style={{ fontSize: 18, flexShrink: 0 }}>{t.icon}</div>
                  <div style={{ fontSize: 13, color: "#94a8c0", lineHeight: 1.5 }}>{t.tip}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ─── GROCERY ─── */}
        {tab === "grocery" && (
          <div>
            <div style={{ background: "#0d1623", borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid #1a2332" }}>
              <div style={{ fontSize: 13, color: "#94a8c0", lineHeight: 1.6 }}>Weekly list for <span style={{ color: "#fff", fontWeight: 700 }}>7 days</span>. Meal prep Sunday — cook all proteins and rice at once.</div>
            </div>
            {GROCERY.map((section, si) => (
              <div key={si} style={{ background: "#0d1623", borderRadius: 14, padding: 16, marginBottom: 12, border: "1px solid #1a2332" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, paddingBottom: 12, borderBottom: "1px solid #111a28" }}>
                  <span style={{ fontSize: 20 }}>{section.icon}</span>
                  <div style={{ fontSize: 13, fontWeight: 800, color: section.color, textTransform: "uppercase", letterSpacing: 1 }}>{section.category}</div>
                </div>
                {section.items.map((item, ii) => (
                  <div key={ii} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: ii < section.items.length-1 ? 12 : 0, paddingBottom: ii < section.items.length-1 ? 12 : 0, borderBottom: ii < section.items.length-1 ? "1px solid #111a28" : "none" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#e8edf5" }}>{item.name}</div>
                      <div style={{ fontSize: 11, color: "#4a6080", marginTop: 2 }}>{item.note}</div>
                    </div>
                    <div style={{ background: section.color+"15", border: `1px solid ${section.color}30`, borderRadius: 6, padding: "4px 10px", fontSize: 12, color: section.color, fontWeight: 700, flexShrink: 0, marginLeft: 10, whiteSpace: "nowrap" }}>{item.qty}</div>
                  </div>
                ))}
              </div>
            ))}
            <div style={{ background: "#00d4aa12", border: "1px solid #00d4aa30", borderRadius: 12, padding: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#00d4aa", marginBottom: 8 }}>🛒 Shopping Strategy</div>
              {["Shop the perimeter first — that's where all your real food lives.", "Buy proteins in bulk and freeze half. Thaw Thursday night for the weekend.", "Frozen berries and broccoli are just as nutritious and cheaper than fresh.", "Pre-portion jerky into 2 oz snack bags on Sunday — grab and go all week."].map((tip, i) => (
                <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <div style={{ color: "#00d4aa", fontSize: 12, flexShrink: 0 }}>→</div>
                  <div style={{ fontSize: 12, color: "#94a8c0", lineHeight: 1.5 }}>{tip}</div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
